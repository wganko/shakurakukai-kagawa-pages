<title>公式LINE 友だち追加</title>
<style>
:root{
  --navy:#195779;
  --navy-dark:#12365b;
  --gold:#c6a15b;
  --paper:#fbfaf6;
  --pale-blue:#eaf3f8;
  --pale-yellow:#fff7d8;
  --pale-green:#eaf8ee;
  --text:#222;
  --line:#d8d5cc;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
html,body{overflow-x:hidden}
body{
  margin:0;
  color:var(--text);
  background:var(--paper);
  font-family:-apple-system,BlinkMacSystemFont,"Yu Gothic","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  line-height:1.75;
}
header{
  background:linear-gradient(135deg,var(--navy-dark),var(--navy));
  color:#fff;
  padding:22px 18px 18px;
  border-bottom:4px solid var(--gold);
}
header h1{font-size:clamp(1.55rem,5vw,2.3rem);margin:0;text-align:center;letter-spacing:.05em}
header p{margin:.35rem 0 0;text-align:center;color:#f4dfab}
main{max-width:860px;margin:0 auto;padding:18px 14px 42px}
.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  padding:18px;
  margin:14px 0;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}
.section-title{
  margin:24px 0 10px;
  padding:9px 14px;
  color:#fff;
  background:var(--navy);
  border-radius:8px;
  font-size:1.2rem;
}
.sub-title{
  color:var(--navy);
  border-bottom:2px solid var(--navy);
  padding-bottom:4px;
  margin-top:18px;
}
.info{background:var(--pale-blue);padding:13px 15px;border-radius:9px}
.alert{background:var(--pale-yellow);padding:13px 15px;border-left:5px solid var(--gold);border-radius:6px}
.ok{background:var(--pale-green);padding:12px 15px;border-radius:7px;margin:8px 0}
.meta{text-align:right;color:#555}
dl{margin:0}
dt{font-weight:700;color:var(--navy);margin-top:7px}
dd{margin:0 0 5px 0}
ul{padding-left:1.35em}
.event{border-left:5px solid var(--navy);padding-left:14px}
.month{
  margin-top:24px;
  padding:8px 14px;
  background:var(--navy);
  color:#fff;
  border-radius:8px;
  font-size:1.25rem;
}
.note{font-size:.92rem;color:#555}
.center{text-align:center}
.qr{display:block;width:min(72vw,340px);height:auto;margin:14px auto;border:1px solid var(--line);padding:10px;background:#fff}
.badge{
  display:inline-block;
  background:#06c755;
  color:#fff;
  font-weight:700;
  padding:.2em .65em;
  border-radius:999px;
}
footer{
  background:var(--navy-dark);
  color:#fff;
  text-align:center;
  padding:14px;
}
@media (max-width:560px){
  main{padding:12px 10px 30px}
  .card{padding:15px;border-radius:10px}
  header{padding-top:18px}
  .section-title{font-size:1.08rem}
}
</style>
</head>
<body>
<header><h1>公式LINE 友だち追加</h1><p>都山流尺楽会香川県支部</p></header>
<main>
<div class="card">
<p>支部からのお知らせは、公式LINEを通じて配信しております。</p>
<p>まだ公式LINEにご登録されていない方は、下記のQRコードから <span class="badge">友だち追加</span> をお願いいたします。</p>
<h2 class="sub-title">配信内容</h2>
<ul>
<li>総会のご案内</li>
<li>年間行事のお知らせ</li>
<li>出欠確認 など</li>
</ul>
